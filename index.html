<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tom Riddle's Diary</title>
  <!-- Import flowing cursive font for Tom's handwriting -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f0ebe0; /* E-ink parchment tone */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* The main writing surface */
    #diary-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none; /* Prevents iPad scrolling while drawing */
      transition: opacity 2s ease-in-out;
    }

    /* Subtle UI for Settings (Top Right Corner) */
    #settings-trigger {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      font-size: 18px;
      opacity: 0.3;
      transition: opacity 0.3s;
    }
    #settings-trigger:hover { opacity: 1; }

    #settings-modal {
      display: none;
      position: absolute;
      top: 70px;
      right: 20px;
      background: #faf7f0;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 300px;
      z-index: 20;
      border: 1px solid #dcd6cd;
    }
    #settings-modal h3 { font-size: 16px; margin-bottom: 8px; color: #333; }
    #settings-modal p { font-size: 12px; color: #666; margin-bottom: 12px; line-height: 1.4; }
    #settings-modal input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 14px;
      background: #fff;
    }
    #settings-modal button {
      background: #2b2b2b;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
    }
    #status-msg {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #888;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>

  <div id="settings-trigger" title="Settings">🪄</div>
  <div id="settings-modal">
    <h3>The Oracle Settings</h3>
    <p>Enter an OpenAI API key to let Tom read your handwriting using Vision AI. Without a key, he will respond with simulated memories.</p>
    <input type="password" id="api-key-input" placeholder="sk-..." />
    <button id="save-btn">Save & Close</button>
  </div>

  <div id="status-msg">The diary is thinking...</div>
  <canvas id="diary-canvas"></canvas>

  <script>
    const canvas = document.getElementById('diary-canvas');
    const ctx = canvas.getContext('2d');
    const settingsTrigger = document.getElementById('settings-trigger');
    const settingsModal = document.getElementById('settings-modal');
    const apiKeyInput = document.getElementById('api-key-input');
    const saveBtn = document.getElementById('save-btn');
    const statusMsg = document.getElementById('status-msg');

    let isDrawing = false;
    let hasDrawn = false;
    let inkTimer = null;
    let apiKey = localStorage.getItem('riddle_api_key') || '';
    
    // Spooky fallback quotes if no API key is provided
    const fallbackQuotes = [
      "Hello. My name is Tom Riddle.",
      "How did you come by my diary?",
      "No one knows the secrets of this place as I do.",
      "I can show you... if you dare to see.",
      "The past is never truly gone. It waits in the ink.",
      "Why do you disturb my slumber?"
    ];

    if (apiKey) apiKeyInput.value = apiKey;

    // Handle Retina displays for crisp Apple Pencil rendering
    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      ctx.scale(dpr, dpr);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = '#1a1a1a'; // Dark ink color
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // UI Toggle
    settingsTrigger.addEventListener('click', () => {
      settingsModal.style.display = settingsModal.style.display === 'block' ? 'none' : 'block';
    });
    saveBtn.addEventListener('click', () => {
      apiKey = apiKeyInput.value.trim();
      localStorage.setItem('riddle_api_key', apiKey);
      settingsModal.style.display = 'none';
    });

    // Drawing Event Listeners (Pointer Events cover Apple Pencil, Touch, and Mouse)
    canvas.addEventListener('pointerdown', (e) => {
      if (e.target !== canvas) return;
      isDrawing = true;
      hasDrawn = true;
      clearTimeout(inkTimer);
      
      const rect = canvas.getBoundingClientRect();
      ctx.beginPath();
      ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!isDrawing) return;
      const rect = canvas.getBoundingClientRect();
      ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
      ctx.stroke();
    });

    const stopDrawing = () => {
      if (!isDrawing) return;
      isDrawing = false;
      
      // Trigger "drink the ink" after 2.5 seconds of inactivity
      if (hasDrawn) {
        clearTimeout(inkTimer);
        inkTimer = setTimeout(absorbInkAndReply, 2500);
      }
    };

    canvas.addEventListener('pointerup', stopDrawing);
    canvas.addEventListener('pointerout', stopDrawing);

    // Core Animation: Drink Ink & Summon Reply
    async function absorbInkAndReply() {
      hasDrawn = false;
      statusMsg.style.opacity = '1';

      // 1. Capture user handwriting as a base64 PNG before fading
      const base64Image = canvas.toDataURL('image/png');

      // 2. Animate canvas fading out ("drinking the ink")
      canvas.style.opacity = '0';
      
      setTimeout(async () => {
        // Clear canvas and restore opacity for the reply
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.style.opacity = '1';

        // 3. Get AI Response
        let replyText = "";
        if (apiKey) {
          replyText = await fetchTomRiddleResponse(base64Image);
        } else {
          // Use random fallback if no API key is present
          replyText = fallbackQuotes[Math.floor(Math.random() * fallbackQuotes.length)];
        }

        statusMsg.style.opacity = '0';

        // 4. Animate Tom's handwriting response
        animateHandwriting(replyText);
      }, 2000);
    }

    // Call OpenAI Vision API
    async function fetchTomRiddleResponse(base64Image) {
      try {
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [
              {
                role: "system",
                content: "You are the sentient memory of Tom Riddle trapped inside his magical diary from Harry Potter. A user is writing to you on the pages. Read their handwritten message in the image and reply in character. Keep your reply concise (1 to 3 sentences maximum), mysterious, slightly manipulative, and dark. Do not break character."
              },
              {
                role: "user",
                content: [
                  { type: "text", text: "Here is what I wrote in your diary:" },
                  { type: "image_url", image_url: { url: base64Image } }
                ]
              }
            ],
            max_tokens: 150
          })
        });

        const data = await response.json();
        if (data.choices && data.choices[0]) {
          return data.choices[0].message.content.trim();
        } else {
          return "The ink blurs... I cannot read your mind.";
        }
      } catch (err) {
        console.error(err);
        return "A shadow passes over the page... (API Error)";
      }
    }

    // Animate flowing cursive text stroke-by-stroke
    function animateHandwriting(text) {
      ctx.font = "38px 'Dancing Script', cursive";
      ctx.fillStyle = "#1a1a1a";
      
      const maxWidth = window.innerWidth * 0.8;
      const x = window.innerWidth * 0.1;
      let y = window.innerHeight * 0.35;
      const lineHeight = 55;

      // Word wrap logic
      const words = text.split(' ');
      const lines = [];
      let currentLine = words[0];

      for (let i = 1; i < words.length; i++) {
        const word = words[i];
        const width = ctx.measureText(currentLine + " " + word).width;
        if (width < maxWidth) {
          currentLine += " " + word;
        } else {
          lines.push(currentLine);
          currentLine = word;
        }
      }
      lines.push(currentLine);

      // Typewriter/Handwriting interval animation
      let lineIdx = 0;
      let charIdx = 0;

      const typeInterval = setInterval(() => {
        if (lineIdx < lines.length) {
          const currentText = lines[lineIdx].substring(0, charIdx + 1);
          
          // Clear line area slightly before redrawing to prevent text stacking overlap issues
          ctx.clearRect(x - 10, y - lineHeight + 15 + (lineIdx * lineHeight), maxWidth + 20, lineHeight + 10);
          ctx.fillText(currentText, x, y + (lineIdx * lineHeight));

          charIdx++;
          if (charIdx >= lines[lineIdx].length) {
            lineIdx++;
            charIdx = 0;
          }
        } else {
          clearInterval(typeInterval);
          
          // Wait 6 seconds for the user to read, then fade the page clean again
          setTimeout(() => {
            canvas.style.opacity = '0';
            setTimeout(() => {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              canvas.style.opacity = '1';
            }, 2000);
          }, 6000);
        }
      }, 45); // Adjust speed of handwriting here (45ms per char)
    }
  </script>
</body>
</html>
